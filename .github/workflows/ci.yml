name: DriveDE CI & Deployment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate Build & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Linting
        run: npm run lint

      - name: Type Checking
        run: npm run typecheck

      - name: Unit Tests (Vitest)
        run: npm run test
        env:
          VITE_SUPABASE_URL: https://placeholder-url.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key

      - name: Verify Production Build
        run: npx vite build

  deploy_ota:
    name: Deploy Mobile OTA
    needs: validate
    # Only deploy on pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Assets
        run: npm run build

      - name: Upload OTA Bundle to Capgo
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Checking if version $VERSION already exists in Capgo..."
          
          # List bundles and check if the current version is already there
          if npx @capgo/cli@latest bundle list de.drivede.app --apikey ${{ secrets.CAPGO_TOKEN }} | grep -q "$VERSION"; then
            echo "✅ Version $VERSION already exists in Capgo. Skipping upload to avoid conflict."
          else
            echo "🚀 Version $VERSION not found. Starting upload..."
            npx @capgo/cli@latest bundle upload \
              --apikey ${{ secrets.CAPGO_TOKEN }} \
              --channel dev \
              --path dist
          fi
