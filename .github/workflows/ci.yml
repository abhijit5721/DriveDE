name: DriveDE CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate Build & Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Linting
        run: npm run lint

      - name: Type Checking
        run: npm run typecheck

      - name: Unit Tests (Vitest)
        run: npm run test
        env:
          # We provide dummy values for tests that don't hit the real network
          VITE_SUPABASE_URL: https://placeholder-url.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key

      - name: Verify Production Build
        run: npx vite build
