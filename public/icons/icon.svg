<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="roadGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#374151"/>
      <stop offset="100%" style="stop-color:#1f2937"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGradient)"/>
  
  <!-- Road -->
  <path d="M156 512 L256 200 L356 512" fill="url(#roadGradient)"/>
  
  <!-- Road markings -->
  <rect x="250" y="240" width="12" height="40" rx="2" fill="white"/>
  <rect x="248" y="300" width="16" height="50" rx="2" fill="white"/>
  <rect x="244" y="370" width="24" height="60" rx="3" fill="white"/>
  <rect x="238" y="450" width="36" height="62" rx="4" fill="white"/>
  
  <!-- Steering wheel -->
  <circle cx="256" cy="140" r="70" fill="none" stroke="white" stroke-width="16"/>
  <circle cx="256" cy="140" r="25" fill="white"/>
  
  <!-- Steering wheel spokes -->
  <rect x="252" y="80" width="8" height="35" fill="white"/>
  <rect x="196" y="136" width="35" height="8" fill="white"/>
  <rect x="281" y="136" width="35" height="8" fill="white"/>
  
  <!-- DE badge -->
  <rect x="350" y="60" width="80" height="50" rx="8" fill="white"/>
  <text x="390" y="95" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1e40af" text-anchor="middle">DE</text>
  
  <!-- Checkmark -->
  <circle cx="420" y="430" r="50" fill="#22c55e"/>
  <path d="M395 430 L410 445 L445 410" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
